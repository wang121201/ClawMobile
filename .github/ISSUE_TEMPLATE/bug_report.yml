name: Bug report
description: Report a reproducible ClawMobile problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve ClawMobile. Please remove secrets and private screenshots before submitting.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime path
      options:
        - ClawMobile Termux runtime
        - Not sure
    validations:
      required: true
  - type: input
    id: android
    attributes:
      label: Android device and version
      placeholder: Pixel 8, Android 15
  - type: input
    id: termux
    attributes:
      label: Termux version/source
      placeholder: F-Droid Termux, version ...
  - type: input
    id: openclaw
    attributes:
      label: OpenClaw version
      placeholder: openclaw --version
  - type: textarea
    id: capability
    attributes:
      label: Capability state
      description: Paste relevant `clawmobile doctor` or `android_health` output after redacting private data.
      render: text
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Use a test account or sanitized task when possible.
      placeholder: |
        1. Run ...
        2. Send ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed API keys, bot tokens, chat IDs, private screenshots, and personal app data.
          required: true
